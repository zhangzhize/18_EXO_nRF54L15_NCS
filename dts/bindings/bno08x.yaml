description: BNO08x Sensor Binding

compatible: "bno08x"  # 注意这里，要和 overlay 里的一致

include: i2c-device.yaml  # 继承通用 I2C 属性

properties:
  intn-gpios:
    type: phandle-array
    required: true
    description: Interrupt pin

  nrst-gpios:
    type: phandle-array
    required: false
    description: Reset pin
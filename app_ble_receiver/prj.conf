#------ APP node ID ----
# EXO_NODE_BLE_RECEIVER
CONFIG_EXO_NODE_ID=6

#------ logging AND console ----
CONFIG_NCS_BOOT_BANNER=n
CONFIG_BOOT_BANNER=n
CONFIG_LOG=y
CONFIG_CONSOLE=n
CONFIG_PRINTK=n
CONFIG_USE_SEGGER_RTT=y
CONFIG_RTT_CONSOLE=n
CONFIG_UART_CONSOLE=n
CONFIG_LOG_BACKEND_RTT=y
CONFIG_LOG_BACKEND_RTT_MODE_DROP=y
CONFIG_LOG_BACKEND_RTT_MODE_BLOCK=n
CONFIG_LOG_MODE_OVERFLOW=y
CONFIG_LOG_PROCESS_THREAD_SLEEP_MS=10

#------ CPP -----
CONFIG_CPP=y

#------ FPU -----
CONFIG_FPU=y
CONFIG_NEWLIB_LIBC=y

#------ HEAP -----
CONFIG_HEAP_MEM_POOL_SIZE=8192

#------ GPIO -----
CONFIG_GPIO=y

#------ UART -----
CONFIG_SERIAL=n
CONFIG_UART_ASYNC_API=n

#------ BLE Central -----
CONFIG_BT=y
CONFIG_BT_CENTRAL=y
CONFIG_BT_OBSERVER=y
CONFIG_BT_DEVICE_NAME="Exo_BLE_Gateway"
CONFIG_BT_MAX_CONN=6
CONFIG_BT_MAX_PAIRED=6

# High-throughput BLE sensor links
CONFIG_BT_PHY_UPDATE=y
CONFIG_BT_USER_PHY_UPDATE=y
CONFIG_BT_AUTO_PHY_CENTRAL_NONE=y
CONFIG_BT_DATA_LEN_UPDATE=y
CONFIG_BT_USER_DATA_LEN_UPDATE=y
CONFIG_BT_L2CAP_TX_MTU=247
CONFIG_BT_BUF_ACL_TX_SIZE=251
CONFIG_BT_BUF_ACL_RX_SIZE=251
CONFIG_BT_BUF_ACL_TX_COUNT=3
CONFIG_BT_BUF_EVT_RX_COUNT=8
CONFIG_BT_BUF_ACL_RX_COUNT_EXTRA=28
CONFIG_BT_L2CAP_TX_BUF_COUNT=3
CONFIG_BT_ATT_TX_COUNT=6

# Scan configuration (nRF Scan library)
CONFIG_BT_SCAN=y
CONFIG_BT_SCAN_FILTER_ENABLE=y
CONFIG_BT_SCAN_ADDRESS_CNT=6

# GATT client for service/characteristic discovery
CONFIG_BT_GATT_CLIENT=y

#------ SPI -----
CONFIG_SPI=y

# No ESB, No I2C
